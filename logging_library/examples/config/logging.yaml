enabled: true
level: INFO
format: json
outputs:
  - type: console
    enabled: true
    format: pretty
  - type: file
    enabled: true
    format: json
    path: logs/application.log
    rolling_policy:
      max_bytes: 10485760
      backup_count: 7
      compression: true
metadata:
  application: billing-platform
  environment: production
  service: payments-api
  version: 1.4.2
  custom:
    owner: platform-engineering
masking:
  enabled: true
  mask: "***MASKED***"
async:
  enabled: true
  queue_size: 10000
  batch_size: 100
  flush_interval_seconds: 1
